# ==========================================
# OPTCG Deck Builder - Application Config
# ==========================================

# Server
server.port=8085

# Perfil por defecto para desarrollo local
spring.profiles.default=mysql

# ==========================================
# JWT
# ==========================================
app.jwt.secret=optcg-deck-builder-tfg-secret-key-must-be-at-least-256-bits-long-2024
app.jwt.expiration=86400000

# ==========================================
# Spring Cache
# ==========================================
spring.cache.type=simple

# ==========================================
# API Externa - Cartas One Piece TCG
# ==========================================
# Base URL para la API externa de cartas
# Esta API es la fuente de verdad para todos los datos de cartas
# Los mazos y colecciones locales solo almacenan IDs externos
optcg.api.base-url=https://optcgapi.com

# ==========================================
# Cloudinary (Avatares)
# ==========================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dyilnub94}
cloudinary.api-key=${CLOUDINARY_API_KEY:121828157262694}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:eYwMi9fuUgjVsN98MhRuDrNqMYA}

# ==========================================
# CORS (para Angular en dev)
# ==========================================
app.cors.allowed-origins=http://localhost:4200

# ==========================================
# Logging
# ==========================================
logging.level.com.optcg=DEBUG
logging.level.org.springframework.security=INFO

# ==========================================
# Correo (Email Receipt)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:noreply.logpose@gmail.com}
spring.mail.password=${SMTP_PASSWORD:jxepefahhgesmjuk}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
